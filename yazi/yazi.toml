[manager]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
linemode = "size"

[preview]
wrap = "yes"
tab_size = 2
max_width = 1000
max_height = 1000

[opener]
image = [
    { run = 'swayimg "$@"', orphan = true }
]

[open]
prepend_rules = [
    { mime = "image/*", use = "image" }
]
