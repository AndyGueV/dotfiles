monitor=,preferred,auto,1

$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

env = XCURSOR_SIZE,18
env = HYPRCURSOR_SIZE,18

# ========================================
# INPUT
# ========================================

input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0
}

# ========================================
# GENERAL
# ========================================

general {
    gaps_in = 5
    gaps_out = 12

    border_size = 2

    col.active_border = rgba(89b4faff)
    col.inactive_border = rgba(313244aa)

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

# ========================================
# ANIMACIONES
# ========================================

animations {
    enabled = true

    bezier = mac, 0.22, 1, 0.36, 1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = soft, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 7, mac, slidefade
    animation = windowsIn, 1, 7, mac, popin 87%
    animation = windowsOut, 1, 6, smoothOut, popin 87%

    animation = fade, 1, 7, soft
    animation = border, 1, 10, soft

    animation = workspaces, 1, 6, mac, slide

    animation = specialWorkspace, 1, 7, mac, slidefadevert
}

# ========================================
# DECORACIONES
# ========================================

decoration {
    rounding = 10

    active_opacity = 0.95
    inactive_opacity = 0.70

    shadow {
        enabled = true

        range = 20
        render_power = 3

        color = rgba(00000055)
    }

    blur {
        enabled = true

        size = 8
        passes = 3

        vibrancy = 0.25
    }
}

# ========================================
# LAYOUTS
# ========================================

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

# ========================================
# MISC
# ========================================

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# ========================================
# BINDS
# ========================================

bind = SUPER, RETURN, exec, kitty

bind = SUPER, Q, killactive
bind = SUPER, E, exec, dolphin
bind = SUPER, R, exec, rofi -show drun

bind = SUPER, F, fullscreen
bind = SUPER, M, fullscreen, 1

bind = SUPER, SPACE, togglefloating

bind = SUPER, L, exec, hyprlock

bind = SUPER, TAB, cyclenext
bind = SUPER SHIFT, TAB, cyclenext, prev
bind = SUPER, N, exec, swaync-client -t

bind = , PRINT, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = SUPER, PRINT, exec, hyprshot -m output -o ~/Pictures/Screenshots
bind = SUPER SHIFT, PRINT, exec, hyprshot -m window -o ~/Pictures/Screenshots

# ========================================
# MOVER FOCO
# ========================================

bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# ========================================
# MOVER VENTANAS
# ========================================

bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# ========================================
# REDIMENSIONAR
# ========================================

bind = SUPER CTRL, right, resizeactive, 5 0
bind = SUPER CTRL, left, resizeactive, -5 0
bind = SUPER CTRL, up, resizeactive, 0 -5
bind = SUPER CTRL, down, resizeactive, 0 5

# ========================================
# SPLIT
# ========================================

bind = SUPER, V, layoutmsg, togglesplit

# ========================================
# CLIPBOARD
# ========================================

bind = SUPER, C, exec, cliphist list | rofi -dmenu -p " Clipboard" | cliphist decode | wl-copy

# ========================================
# SCREEN RECORDER
# ========================================

bind = SUPER SHIFT, R, exec, gpu-screen-recorder-gtk

# ========================================
# WORKSPACES
# ========================================

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# ========================================
# AUTOSTART
# ========================================

exec-once = awww-daemon
exec-once = sleep 2 && awww img ~/Pictures/fondo2.jpg

exec-once = nm-applet --indicator
exec-once = waybar
exec-once = swaync
exec-once = blueman-applet

exec-once = hypridle

exec-once = ~/.config/hypr/scripts/battery-monitor.sh

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
