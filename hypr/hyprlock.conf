background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

general {
    hide_cursor = true
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"

    color = rgba(255,255,255,1)

    font_size = 90
    font_family = JetBrainsMono Nerd Font

    position = 0, 220
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"

    color = rgba(200,200,200,1)

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 140
    halign = center
    valign = center
}

input-field {
    monitor =

    size = 320, 55

    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.2

    dots_center = true

    outer_color = rgba(137,180,250,0.8)
    inner_color = rgba(0,0,0,0.45)
    font_color = rgba(255,255,255,1)

    fade_on_empty = false

    rounding = 20

    check_color = rgba(166,227,161,1)
    fail_color = rgba(243,139,168,1)

    placeholder_text = Password...

    position = 0, -40
    halign = center
    valign = center
}
